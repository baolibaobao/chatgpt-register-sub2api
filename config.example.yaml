mail:
  providers:
    - type: outlook_token
      enable: true
      label: Outlook Pool
      mode: graph
      graph_scope: "https://graph.microsoft.com/.default"
      imap_host: outlook.office365.com
      message_limit: 10
      mailboxes: |
        user1@outlook.com----password1----client_id_1----refresh_token_1
        user2@hotmail.com----password2----client_id_2----refresh_token_2
    - type: gmail_imap
      enable: false
      label: Gmail Variants
      login_email: "your-main@gmail.com"
      app_password: "your-gmail-app-password"
      imap_host: imap.gmail.com
      imap_port: 993
      message_limit: 20
      match_recipient: true
      variants: |
        your-main+001@gmail.com
        your-main+002@gmail.com
        your-main+003@gmail.com
    - type: api_code
      enable: false
      label: API Code Pool
      mailboxes: |
        user@example.com----https://example.com/api/code/fetch?token=TOKEN&uid=UID
  proxy: ""
  request_timeout: 30
  wait_timeout: 45
  wait_interval: 3

proxy:
  url: ""
  flaresolverr_url: ""

registration:
  threads: 3
  total: 10

workspace:
  enabled: true
  ids:
    - "your-k12-workspace-uuid"
  route: request
  max_retries: 3
  retry_backoff_ms: 5000

sub2api:
  enabled: true
  output_file: "sub2api_bundle.json"

logging:
  level: INFO
  file: ""

